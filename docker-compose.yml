# 多智能体协同作业平台 - Docker Compose 配置
version: '3.8'

services:
  # ==================== PostgreSQL 数据库 ====================
  postgres:
    image: postgres:15-alpine
    container_name: macp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: macp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - macp-network

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: macp-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - macp-network

  # ==================== RabbitMQ 消息队列 ====================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: macp-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP 端口
      - "15672:15672" # 管理界面
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - macp-network

  # ==================== 后端 API 服务 ====================
  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    container_name: macp-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/macp_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - macp-network
    restart: unless-stopped

  # ==================== Celery Worker ====================
  celery-worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    container_name: macp-celery-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/macp_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    command: celery -A backend.app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app/backend
      - ./logs:/app/logs
    depends_on:
      - backend
      - redis
      - rabbitmq
    networks:
      - macp-network
    restart: unless-stopped
    deploy:
      replicas: 2

  # ==================== Celery Beat (定时任务) ====================
  celery-beat:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    container_name: macp-celery-beat
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/macp_db
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
    command: celery -A backend.app.celery_app beat --loglevel=info
    depends_on:
      - backend
      - redis
      - rabbitmq
    networks:
      - macp-network
    restart: unless-stopped

  # ==================== Prometheus 监控 ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: macp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - macp-network
    restart: unless-stopped

  # ==================== Grafana 可视化 ====================
  grafana:
    image: grafana/grafana:latest
    container_name: macp-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./deploy/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - macp-network
    restart: unless-stopped

networks:
  macp-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
